apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  template:
    spec:
      hostNetwork: true
      containers:
        - name: app
          image: myapp:latest
          env:
            - name: DB_PASSWORD
              value: "k8s_hardcoded_password_123"
          securityContext:
            privileged: true
            runAsUser: 0
            allowPrivilegeEscalation: true
